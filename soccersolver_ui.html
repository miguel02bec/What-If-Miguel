<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoccerSolver — Simulador What-If</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2d3148;
  --accent:#4f8ef7;--accent2:#7c3aed;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--white:#fff;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* LAYOUT */
.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:0}
.main{padding:24px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}

/* HEADER */
.header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:var(--accent2);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.5px}

/* SEARCH */
.search-box{padding:16px}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}

/* PLAYER LIST */
.player-list{flex:1;overflow-y:auto;padding:0 8px 16px}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.player-item:hover{background:var(--surface2)}
.player-item.active{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3)}
.player-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-meta{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-ovr{font-weight:700;font-size:13px;color:var(--accent)}

/* MAIN PANELS */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.panel-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}

/* PLAYER HERO */
.hero{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
.hero-name{font-size:24px;font-weight:700;margin-bottom:4px}
.hero-sub{color:var(--muted);font-size:13px;margin-bottom:12px}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500}
.tag.pos{border-color:var(--accent);color:var(--accent)}

/* VALUE DISPLAY */
.value-block{text-align:right}
.value-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.value-main{font-size:28px;font-weight:800;color:var(--accent);line-height:1}
.value-conf{font-size:11px;color:var(--muted);margin-top:4px}
.value-delta{font-size:15px;font-weight:700;margin-top:6px}
.value-delta.pos{color:var(--green)}
.value-delta.neg{color:var(--red)}
.value-delta.zero{color:var(--muted)}

/* VALUE BAR */
.value-bar-wrap{margin-top:12px}
.value-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.value-bar-track{height:8px;background:var(--surface2);border-radius:4px;position:relative;overflow:visible}
.value-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}
.value-bar-marker{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;border:2px solid var(--white);transform:translateX(-50%);transition:left .4s ease}
.marker-base{background:var(--muted)}
.marker-new{background:var(--accent)}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--surface2);border-radius:8px;padding:10px 12px;text-align:center}
.stat-val{font-size:22px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.stat-val.high{color:var(--green)}
.stat-val.mid{color:var(--yellow)}
.stat-val.low{color:var(--red)}

/* SLIDERS */
.sliders-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.slider-row{display:flex;flex-direction:column;gap:4px}
.slider-header{display:flex;justify-content:space-between;align-items:center}
.slider-label{font-size:12px;color:var(--muted)}
.slider-val{font-size:13px;font-weight:700;color:var(--text);min-width:28px;text-align:right}
.slider-val.changed{color:var(--accent)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--white);cursor:pointer;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}

/* KEY LEVERS */
.levers-list{display:flex;flex-direction:column;gap:8px}
.lever-row{display:flex;align-items:center;gap:10px}
.lever-rank{width:20px;height:20px;border-radius:50%;background:var(--accent2);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lever-name{flex:1;font-size:13px}
.lever-bar-wrap{width:80px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.lever-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.lever-delta{font-size:12px;font-weight:600;min-width:60px;text-align:right;color:var(--green)}
.lever-delta.neg{color:var(--red)}

/* SCENARIOS */
.scenarios-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scenario-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px}
.scenario-card.active-scenario{border-color:var(--accent)}
.scenario-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.scenario-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase}
.scenario-value{font-size:18px;font-weight:800;color:var(--accent)}
.scenario-diff{font-size:12px;margin-top:4px}
.scenario-diff.pos{color:var(--green)}
.scenario-diff.neg{color:var(--red)}
.scenario-changes{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3d7ae0}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);padding:4px 10px;font-size:11px}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* TM HISTORY */
.history-bar-wrap{display:flex;flex-direction:column;gap:6px}
.history-bar-row{display:flex;align-items:center;gap:8px}
.history-year{font-size:11px;color:var(--muted);width:36px;flex-shrink:0}
.history-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.history-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .6s ease}
.history-val{font-size:11px;font-weight:600;min-width:70px;text-align:right}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center;gap:12px}
.empty-icon{font-size:40px;opacity:.3}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{max-height:300px}
  .sliders-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .scenarios-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="header">
    <div>
      <div class="logo">⚽ SoccerSolver</div>
    </div>
    <span class="badge">WHAT-IF</span>
  </div>
  <div class="search-box">
    <input class="search-input" id="search" type="text" placeholder="Buscar jugador..." oninput="filterPlayers(this.value)">
  </div>
  <div class="player-list" id="player-list"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="empty">
    <div class="empty-icon">🔍</div>
    <div style="font-size:16px;font-weight:600;color:var(--text)">Selecciona un jugador</div>
    <div>Busca y haz clic en cualquier jugador de la lista para ver su simulador</div>
  </div>
</div>

</div>

// ══════════════════════════════════════════════════════════
function predictDelta(player, modifiedFeatures) {
  let logBase  = Math.log1p(player.real_value || player.predicted.predicted_eur);
  let logDelta = 0;

  const levers = player.levers;
  for (const lev of levers) {
    const feat    = lev.feature;
    const base    = player.features[feat] || 0;
    const newVal  = modifiedFeatures[feat] !== undefined ? modifiedFeatures[feat] : base;
    const delta   = newVal - base;
    if (delta === 0) continue;

    // Sensibilidad empírica: usa el delta_eur/delta calculado en Python
    const empiricalRate = lev.delta_eur / (player.real_value || 1);
    logDelta += empiricalRate * delta;
  }

  // Contribución de features no en levers
  const allLevers = new Set(levers.map(l => l.feature));
  for (const [feat, label] of Object.entries(SLIDER_FEATURES)) {
    if (allLevers.has(feat)) continue;
    const base   = player.features[feat] || 0;
    const newVal = modifiedFeatures[feat] !== undefined ? modifiedFeatures[feat] : base;
    const delta  = newVal - base;
    if (delta === 0 || !["overall","potential"].includes(feat)) continue;
    // overall y potential tienen impacto alto aunque no estén en top5 levers mostrados
    const scale = feat === "overall" ? 0.35 : 0.25;
    logDelta += scale * delta * 0.08;
  }

  const baseEur  = player.predicted.predicted_eur;
  const newEur   = baseEur * Math.exp(logDelta * 8);
  const confPct  = {GK:0.18,DEF:0.08,MID:0.15,FWD:0.17}[player.group] || 0.15;
  return {
    predicted_eur: Math.round(Math.max(0, newEur)),
    conf_low:      Math.round(Math.max(0, newEur*(1-confPct))),
    conf_high:     Math.round(newEur*(1+confPct)),
    delta_eur:     Math.round(newEur - baseEur),
    delta_pct:     ((newEur - baseEur)/baseEur*100).toFixed(1),
  };
}

// ══════════════════════════════════════════════════════════
// FORMATTERS
// ══════════════════════════════════════════════════════════
function fmtEur(v) {
  if (!v && v!==0) return "—";
  if (v >= 1e8)    return `€${(v/1e6).toFixed(0)}M`;
  if (v >= 1e6)    return `€${(v/1e6).toFixed(1)}M`;
  if (v >= 1e3)    return `€${(v/1e3).toFixed(0)}K`;
  return `€${v}`;
}
function fmtDelta(v) {
  if (!v) return "";
  const sign = v > 0 ? "+" : "";
  return `${sign}${fmtEur(Math.abs(v))}`;
}
function ovrClass(v) {
  if (v >= 80) return "high"; if (v >= 70) return "mid"; return "low";
}
function initials(name) {
  return name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();
}

// ══════════════════════════════════════════════════════════
// PLAYER LIST
// ══════════════════════════════════════════════════════════
function renderList(list) {
  const el = document.getElementById("player-list");
  el.innerHTML = list.slice(0,80).map(p => `
    <div class="player-item ${state.player?.id===p.id?'active':''}" onclick="selectPlayer(${p.id})">
      <div class="player-avatar">${initials(p.name)}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">${p.position} · ${p.club}</div>
      </div>
      <div class="player-ovr">${p.overall}</div>
    </div>
  `).join("");
}

function filterPlayers(q) {
  const qq = q.toLowerCase();
  const filtered = qq
    ? PLAYERS.filter(p => p.name.toLowerCase().includes(qq) || p.full_name.toLowerCase().includes(qq) || p.club.toLowerCase().includes(qq))
    : PLAYERS;
  renderList(filtered);
}

// ══════════════════════════════════════════════════════════
// SELECT PLAYER
// ══════════════════════════════════════════════════════════
function selectPlayer(id) {
  state.player   = PLAYERS.find(p => p.id === id);
  state.modified = {};
  renderList(PLAYERS);
  renderMain();
}

// ══════════════════════════════════════════════════════════
// SLIDER CHANGE
// ══════════════════════════════════════════════════════════
function onSlider(feat, val) {
  const p = state.player;
  if (!p) return;
  const base = p.features[feat] || 0;
  val = parseFloat(val);
  if (val === base) {
    delete state.modified[feat];
  } else {
    state.modified[feat] = val;
  }
  updateValueDisplay();
  updateSliderLabel(feat, val, base);
}

function updateSliderLabel(feat, val, base) {
  const el = document.getElementById(`lbl-${feat}`);
  if (!el) return;
  el.textContent = Number.isInteger(base) ? Math.round(val) : val.toFixed(1);
  el.classList.toggle("changed", val !== base);
}

function updateValueDisplay() {
  const p = state.player;
  if (!p) return;

  const allFeats = {...p.features, ...state.modified};
  const result   = predictDelta(p, allFeats);
  const delta    = result.delta_eur;
  const hasChange = Object.keys(state.modified).length > 0;

  // Valor principal
  const newVal = hasChange ? result.predicted_eur : p.predicted.predicted_eur;
  document.getElementById("val-main").textContent   = fmtEur(newVal);
  document.getElementById("val-conf").textContent   = `${fmtEur(result.conf_low)} – ${fmtEur(result.conf_high)}`;

  // Delta
  const deltaEl = document.getElementById("val-delta");
  if (hasChange && delta !== 0) {
    const sign = delta > 0 ? "▲" : "▼";
    deltaEl.textContent = `${sign} ${fmtEur(Math.abs(delta))} (${delta>0?"+":""}${result.delta_pct}%)`;
    deltaEl.className   = `value-delta ${delta>0?"pos":"neg"}`;
  } else {
    deltaEl.textContent = hasChange ? "Sin cambio" : "";
    deltaEl.className   = "value-delta zero";
  }

  // Barra
  const baseEur = p.predicted.predicted_eur;
  const maxEur  = baseEur * 1.5;
  const basePct = Math.min(100, baseEur/maxEur*100);
  const newPct  = Math.min(100, newVal/maxEur*100);
  const barFill = document.getElementById("bar-fill");
  const markerNew = document.getElementById("marker-new");
  if (barFill) barFill.style.width = newPct+"%";
  if (markerNew) markerNew.style.left = newPct+"%";
}

// ══════════════════════════════════════════════════════════
// SAVE SCENARIO
// ══════════════════════════════════════════════════════════
function saveScenario() {
  const p = state.player;
  if (!p || Object.keys(state.modified).length === 0) {
    alert("Modifica al menos un atributo antes de guardar el escenario.");
    return;
  }
  if (state.scenarios.length >= 2) state.scenarios.shift();

  const allFeats = {...p.features, ...state.modified};
  const result   = predictDelta(p, allFeats);
  const changes  = Object.entries(state.modified).map(([k,v]) => {
    const base = p.features[k]||0;
    return `${SLIDER_FEATURES[k]||k}: ${base}→${Number.isInteger(base)?Math.round(v):v.toFixed(1)}`;
  });

  state.scenarios.push({
    label:     `Escenario ${state.scenarios.length+1}`,
    player:    p.name,
    value:     result.predicted_eur,
    base:      p.predicted.predicted_eur,
    delta_eur: result.delta_eur,
    delta_pct: result.delta_pct,
    changes,
    modified:  {...state.modified},
  });
  renderScenarios();
}

function clearScenarios() {
  state.scenarios = [];
  renderScenarios();
}

function renderScenarios() {
  const el = document.getElementById("scenarios-panel");
  if (!el) return;
  if (state.scenarios.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">
      Guarda escenarios para compararlos aquí</div>`;
    return;
  }
  el.innerHTML = `<div class="scenarios-grid">` +
    state.scenarios.map((sc,i) => `
      <div class="scenario-card ${i===state.scenarios.length-1?'active-scenario':''}">
        <div class="scenario-header">
          <div class="scenario-title">${sc.label}</div>
          <button class="btn btn-danger" onclick="state.scenarios.splice(${i},1);renderScenarios()">✕</button>
        </div>
        <div class="scenario-value">${fmtEur(sc.value)}</div>
        <div class="scenario-diff ${sc.delta_eur>=0?'pos':'neg'}">
          ${sc.delta_eur>=0?"▲":"▼"} ${fmtEur(Math.abs(sc.delta_eur))} (${sc.delta_eur>=0?"+":""}${sc.delta_pct}%)
          vs base
        </div>
        <div class="scenario-changes">${sc.changes.join("<br>")}</div>
      </div>
    `).join("") + `</div>`;
}

// ══════════════════════════════════════════════════════════
// RESET SLIDERS
// ══════════════════════════════════════════════════════════
function resetSliders() {
  const p = state.player;
  if (!p) return;
  state.modified = {};
  for (const feat of Object.keys(SLIDER_FEATURES)) {
    const slider = document.getElementById(`slider-${feat}`);
    const val    = p.features[feat];
    if (slider && val !== undefined) {
      slider.value = val;
      updateSliderLabel(feat, val, val);
    }
  }
  updateValueDisplay();
}

// ══════════════════════════════════════════════════════════
// RENDER MAIN
// ══════════════════════════════════════════════════════════
function renderMain() {
  const p = state.player;
  if (!p) return;

  const pred     = p.predicted;
  const baseEur  = pred.predicted_eur;
  const maxEur   = baseEur * 1.5;
  const basePct  = Math.min(100, baseEur/maxEur*100);

  // Key levers: los top 3 positivos
  const topLevers = p.levers
    .filter(l => l.delta_eur > 0)
    .slice(0,3);
  const maxImp = Math.max(...topLevers.map(l=>l.delta_eur), 1);

  // TM value comparison
  const tmVal  = p.tm_value;
  const tmDiff = tmVal ? tmVal - baseEur : null;

  // Sliders activos para esta posición
  const sliderKeys = Object.keys(SLIDER_FEATURES).filter(f => p.features[f] !== undefined);

  const html = `
  <!-- HERO -->
  <div class="panel">
    <div class="hero">
      <div>
        <div class="hero-name">${p.name}</div>
        <div class="hero-sub">${p.full_name} · ${p.club} · ${p.league}</div>
        <div class="hero-tags">
          <span class="tag pos">${p.position}</span>
          <span class="tag">${p.group}</span>
          <span class="tag">${p.nationality}</span>
          <span class="tag">Age ${p.age}</span>
          ${p.tm_value ? `<span class="tag" style="border-color:var(--yellow);color:var(--yellow)">TM data ✓</span>` : ""}
        </div>
      </div>
      <div class="value-block">
        <div class="value-label">VALOR PREDICHO</div>
        <div class="value-main" id="val-main">${fmtEur(baseEur)}</div>
        <div class="value-conf" id="val-conf">${fmtEur(pred.conf_low)} – ${fmtEur(pred.conf_high)}</div>
        <div class="value-delta zero" id="val-delta"></div>
      </div>
    </div>

    <!-- BARRA BASE vs NUEVO -->
    <div class="value-bar-wrap">
      <div class="value-bar-labels">
        <span>€0</span>
        <span style="color:var(--muted);font-size:10px">Base: ${fmtEur(baseEur)}</span>
        <span>${fmtEur(maxEur)}</span>
      </div>
      <div class="value-bar-track">
        <div class="value-bar-fill" id="bar-fill" style="width:${basePct}%"></div>
        <div class="value-bar-marker marker-base" style="left:${basePct}%" title="Valor base"></div>
        <div class="value-bar-marker marker-new" id="marker-new" style="left:${basePct}%;background:var(--accent)" title="Valor actual"></div>
      </div>
    </div>

    ${tmVal ? `
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">TRANSFERMARKT</div>
        <div style="font-size:15px;font-weight:700;color:var(--yellow)">${fmtEur(tmVal)}</div></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">DIFERENCIA</div>
        <div style="font-size:15px;font-weight:700;color:${tmDiff>=0?"var(--green)":"var(--red)"}">
          ${tmDiff>=0?"+":""}${fmtEur(tmDiff)}</div></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">MÁXIMO HISTÓRICO TM</div>
        <div style="font-size:15px;font-weight:700;color:var(--muted)">${fmtEur(p.tm_highest_value||null)}</div></div>
    </div>` : ""}
  </div>

  <!-- STATS + KEY LEVERS -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

    <!-- STATS -->
    <div class="panel">
      <div class="panel-title">Atributos principales</div>
      <div class="stats-grid">
        ${["overall","potential","pace","shooting","passing","dribbling","defending","physic"].map(f => {
          const v = Math.round(p.features[f]||0);
          return `<div class="stat-box">
            <div class="stat-val ${ovrClass(v)}">${v}</div>
            <div class="stat-lbl">${SLIDER_FEATURES[f]||f}</div>
          </div>`;
        }).join("")}
        <div class="stat-box">
          <div class="stat-val" style="font-size:16px">${Math.round(p.features.weak_foot||0)}★</div>
          <div class="stat-lbl">Weak Foot</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="font-size:16px">${Math.round(p.features.skill_moves||0)}★</div>
          <div class="stat-lbl">Skills</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="font-size:16px">${Math.round(p.features.international_reputation||0)}★</div>
          <div class="stat-lbl">Intl. Rep.</div>
        </div>
      </div>
    </div>

    <!-- KEY LEVERS -->
    <div class="panel">
      <div class="panel-title">🔑 Key levers — mayor impacto en precio</div>
      <div class="levers-list">
        ${p.levers.map((lev,i) => {
          const pct = Math.round(Math.abs(lev.delta_eur)/Math.max(...p.levers.map(l=>Math.abs(l.delta_eur)),1)*100);
          const label = SLIDER_FEATURES[lev.feature] || lev.feature;
          const inc = lev.inc || 5;
          return `<div class="lever-row">
            <div class="lever-rank">${i+1}</div>
            <div class="lever-name">${label}</div>
            <div class="lever-bar-wrap"><div class="lever-bar" style="width:${pct}%"></div></div>
            <div class="lever-delta ${lev.delta_eur<0?'neg':''}">${fmtDelta(lev.delta_eur)} <span style="color:var(--muted)">(+${inc})</span></div>
          </div>`;
        }).join("")}
      </div>
      <div style="margin-top:12px;font-size:11px;color:var(--muted)">
        Impacto de subir cada atributo en +5 puntos (o +1 para estrellas y contrato)
      </div>
    </div>
  </div>

  <!-- SIMULADOR WHAT-IF -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="panel-title" style="margin-bottom:0">⚡ Simulador What-If — mueve los sliders</div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetSliders()">↺ Reset</button>
        <button class="btn btn-primary" onclick="saveScenario()">💾 Guardar escenario</button>
      </div>
    </div>
    <div class="sliders-grid">
      ${sliderKeys.map(feat => {
        const val   = p.features[feat];
        const range = SLIDER_RANGES[feat] || [0,99];
        const label = SLIDER_FEATURES[feat];
        const isInt = Number.isInteger(val);
        return `<div class="slider-row">
          <div class="slider-header">
            <span class="slider-label">${label}</span>
            <span class="slider-val" id="lbl-${feat}">${isInt?Math.round(val):val?.toFixed(1)}</span>
          </div>
          <input type="range" id="slider-${feat}"
            min="${range[0]}" max="${range[1]}" step="${feat.includes('_reputation')||feat==='weak_foot'||feat==='skill_moves'?1:1}"
            value="${val}"
            oninput="onSlider('${feat}', this.value)">
        </div>`;
      }).join("")}
    </div>
  </div>

  <!-- COMPARADOR DE ESCENARIOS -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="panel-title" style="margin-bottom:0">📊 Comparador de escenarios</div>
      ${state.scenarios.length>0?`<button class="btn btn-secondary" onclick="clearScenarios()">Borrar todo</button>`:""}
    </div>
    <div id="scenarios-panel">
      <div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">
        Guarda escenarios para compararlos aquí</div>
    </div>
  </div>
  `;

  document.getElementById("main").innerHTML = html;
  renderScenarios();
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
renderList(PLAYERS);
</script>
</body>
</html>
